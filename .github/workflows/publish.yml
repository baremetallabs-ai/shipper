name: Publish

on:
  push:
    tags: ['v*']

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org
          scope: '@baremetallabs-ai'
      - run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

      - run: npm run lint
      - run: npm run format:check
      - run: npm run type-check
      - run: npm run build
      - run: npm run test

      - name: Verify tag matches all package versions
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          for pkg in cli core desktop mcp; do
            PKG_VERSION="$(node -p "require('./packages/${pkg}/package.json').version")"
            if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
              echo "::error::Tag ${GITHUB_REF_NAME} does not match packages/${pkg} version ${PKG_VERSION}"
              exit 1
            fi
          done

      - name: Publish core if needed
        run: |
          CORE_NAME="$(node -p "require('./packages/core/package.json').name")"
          CORE_VERSION="$(node -p "require('./packages/core/package.json').version")"

          if npm view "${CORE_NAME}@${CORE_VERSION}" version >/dev/null 2>&1; then
            echo "${CORE_NAME}@${CORE_VERSION} already published"
          else
            npm publish --workspace=packages/core --provenance
          fi

      - run: npm publish --workspace=packages/cli --provenance

  publish-desktop:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Build core
        run: npm run build --workspace=packages/core

      - name: Build desktop
        run: npm run build --workspace=packages/desktop

      - name: Package desktop app
        run: npx electron-builder --mac --arm64 --publish never
        working-directory: packages/desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          shopt -s nullglob
          dmg_assets=(packages/desktop/release/*.dmg)
          zip_assets=(packages/desktop/release/*.zip)
          assets=("${dmg_assets[@]}" "${zip_assets[@]}")

          if [ "${#dmg_assets[@]}" -eq 0 ]; then
            echo "::error::No desktop DMG artifacts found in packages/desktop/release"
            exit 1
          fi

          if [ "${#zip_assets[@]}" -eq 0 ]; then
            echo "::error::No desktop zip artifacts found in packages/desktop/release"
            exit 1
          fi

          echo "desktop assets:"
          printf '  %s\n' "${assets[@]}"

          if release_state="$(gh release view "${TAG}" --json isDraft,isPrerelease,targetCommitish --jq '[.isDraft, .isPrerelease, (.targetCommitish // "")] | @tsv')"; then
            IFS=$'\t' read -r was_draft was_prerelease target_commitish <<< "${release_state}"
            was_latest="$(gh release list --limit 1000 --json tagName,isLatest --jq ".[] | select(.tagName == \"${TAG}\") | .isLatest")"
            was_latest="${was_latest:-false}"

            if [ "${was_draft}" = "true" ]; then
              release_path="recovered prior draft"
            elif [ "${was_prerelease}" = "true" ] || [ "${was_latest}" != "true" ] || { [ "${target_commitish}" != "${GITHUB_SHA}" ] && [ "${target_commitish}" != "${DEFAULT_BRANCH}" ]; }; then
              release_path="normalized existing release"
            else
              release_path="refreshed existing release"
            fi

            echo "release path: ${release_path} (was_draft=${was_draft}, was_prerelease=${was_prerelease}, was_latest=${was_latest}, target_commitish=${target_commitish}, workflow_sha=${GITHUB_SHA})"
            gh release upload "${TAG}" "${assets[@]}" --clobber
            gh release edit "${TAG}" --draft=false --prerelease=false --target "${GITHUB_SHA}" --verify-tag
            gh release edit "${TAG}" --latest
          else
            echo "release path: created fresh"
            gh release create "${TAG}" \
              --title "${TAG}" \
              --generate-notes \
              --latest \
              --verify-tag \
              "${assets[@]}"
          fi
