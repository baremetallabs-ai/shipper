name: Publish

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://npm.pkg.github.com
          scope: '@dnsquared'
      - run: npm ci

      - run: npm run lint
      - run: npm run format:check
      - run: npm run type-check
      - run: npm run build
      - run: npm run test

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./packages/cli/package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match package.json version ${PKG_VERSION}"
            exit 1
          fi

      - name: Publish core if needed
        run: |
          CORE_NAME="$(node -p "require('./packages/core/package.json').name")"
          CORE_VERSION="$(node -p "require('./packages/core/package.json').version")"

          if npm view "${CORE_NAME}@${CORE_VERSION}" version --registry=https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "${CORE_NAME}@${CORE_VERSION} already published"
          else
            npm publish --workspace=packages/core
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: npm publish --workspace=packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
