name: Publish

on:
  push:
    tags: ['v*']

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org
          scope: '@baremetallabs-ai'
      - run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

      - run: npm run lint
      - run: npm run format:check
      - run: npm run type-check
      - run: npm run build
      - run: npm run test

      - name: Verify tag matches all package versions
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          for pkg in cli core desktop mcp; do
            PKG_VERSION="$(node -p "require('./packages/${pkg}/package.json').version")"
            if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
              echo "::error::Tag ${GITHUB_REF_NAME} does not match packages/${pkg} version ${PKG_VERSION}"
              exit 1
            fi
          done

      - name: Publish core if needed
        run: |
          CORE_NAME="$(node -p "require('./packages/core/package.json').name")"
          CORE_VERSION="$(node -p "require('./packages/core/package.json').version")"

          if npm view "${CORE_NAME}@${CORE_VERSION}" version >/dev/null 2>&1; then
            echo "${CORE_NAME}@${CORE_VERSION} already published"
          else
            npm publish --workspace=packages/core --provenance
          fi

      - run: npm publish --workspace=packages/cli --provenance

  publish-desktop:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Build core
        run: npm run build --workspace=packages/core

      - name: Build desktop
        run: npm run build --workspace=packages/desktop

      - name: Package desktop app
        run: npx electron-builder --mac --arm64 --publish never
        working-directory: packages/desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" packages/desktop/release/*.dmg packages/desktop/release/*.zip --clobber
          else
            gh release create "${TAG}" \
              --title "${TAG}" \
              --generate-notes \
              packages/desktop/release/*.dmg \
              packages/desktop/release/*.zip
          fi
